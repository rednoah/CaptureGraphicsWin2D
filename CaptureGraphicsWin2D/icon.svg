<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="appleBlueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1877F2" stop-opacity="1" />
      <stop offset="100%" stop-color="#007FFF" stop-opacity="1" />
    </linearGradient>

    <linearGradient id="glassDomeHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <filter id="plateShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.5" />
    </filter>

    <filter id="elementShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <rect x="24" y="24" width="208" height="208" rx="52" fill="#000000" fill-opacity="0.01" filter="url(#plateShadow)" />

  <rect x="24" y="24" width="208" height="208" rx="52" fill="url(#appleBlueGradient)" />

  <rect x="24" y="24" width="208" height="208" rx="52" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.3" />

    <g stroke="#4CFF00" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
	    <path d="M 72 48 L 48 48 L 48 72" />
	    <path d="M 184 48 L 208 48 L 208 72" />
	    <path d="M 72 208 L 48 208 L 48 184" />
	    <path d="M 184 208 L 208 208 L 208 184" />
    </g>
	
  <g filter="url(#elementShadow)">
    
    <g transform="translate(128,128)">
      <rect x="-65" y="-65" width="130" height="130" rx="20" fill="#6082B6" stroke="#ffffff" stroke-width="4" />
    </g>
    
  </g>

  <rect x="24" y="24" width="208" height="104" rx="52" fill="url(#glassDomeHighlight)" />
  
</svg>
